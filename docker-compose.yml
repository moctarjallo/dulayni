services:
  dulayni:
    build: .
    ports:
      - "8001:8001"  # MCP server
      - "8002:8002"  # FastAPI server
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - DULAYNI_ENV=${DULAYNI_ENV:-development}
      - DEBUG_TOOLS=${DEBUG_TOOLS:-false}
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health", "||", "exit", "1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
